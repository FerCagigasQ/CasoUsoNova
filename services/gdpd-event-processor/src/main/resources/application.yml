spring:
  application:
    name: gdpd-event-processor
  cloud:
    stream:
      bindings:
        pedidos-created-in-0:
          destination: pedidos.created
          content-type: application/json
          group: gdpd-processors
        pedidos-updated-in-0:
          destination: pedidos.updated
          content-type: application/json
          group: gdpd-processors
        pedidos-deleted-in-0:
          destination: pedidos.deleted
          content-type: application/json
          group: gdpd-processors
      rabbit:
        bindings:
          pedidos-created-in-0:
            consumer:
              bindingRoutingKey: pedidos.created
              durableSubscription: true
          pedidos-updated-in-0:
            consumer:
              bindingRoutingKey: pedidos.updated
              durableSubscription: true
          pedidos-deleted-in-0:
            consumer:
              bindingRoutingKey: pedidos.deleted
              durableSubscription: true
    config:
      uri: http://localhost:8888
      name: gdpd-event-processor
      profile: ${spring.profiles.active:dev}
      fail-fast: true
  rabbitmq:
    host: ${BROKER_HOST:localhost}
    port: ${BROKER_PORT:5672}
    username: ${BROKER_USER:guest}
    password: ${BROKER_PASS:guest}
  sleuth:
    sampler:
      probability: 1.0
    propagation:
      type: B3
    web:
      enabled: true
    async:
      enabled: true
    messaging:
      enabled: true
  zipkin:
    base-url: http://localhost:9411
    enabled: true
    sender:
      type: web
  datasource:
    url: jdbc:postgresql://localhost:5432/gdpddb
    username: nova
    password: ${DB_PASSWORD:nova}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    loggers:
      enabled: true
  health:
    db:
      enabled: true
    diskSpace:
      enabled: true
    jms:
      enabled: true
    eureka:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:dev}
      version: @project.version@

info:
  app:
    name: ${spring.application.name}
    description: "Servicio GDPD - Event Processor (demonio consumidor de eventos)"
    version: @project.version@
    build-time: @maven.build.timestamp@
  java:
    version: ${java.version}
  spring:
    boot-version: @spring-boot.version@

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
