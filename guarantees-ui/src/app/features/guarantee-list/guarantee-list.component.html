<div class="guarantee-list-container">
  <div class="header">
    <h1>Guarantees</h1>
    <button mat-raised-button color="primary" routerLink="/new">
      <mat-icon>add</mat-icon> New Guarantee
    </button>
  </div>

  <div class="filters">
    <mat-form-field>
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup)="onSearch()">
    </mat-form-field>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="guarantees" class="guarantee-table">
      <ng-container matColumnDef="number">
        <th mat-header-cell *matHeaderCellDef>Number</th>
        <td mat-cell *matCellDef="let element">{{ element.number }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>
      <ng-container matColumnDef="beneficiary">
        <th mat-header-cell *matHeaderCellDef>Beneficiary</th>
        <td mat-cell *matCellDef="let element">{{ element.beneficiary }}</td>
      </ng-container>
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let element">{{ element.amount | currency }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">
          <span [class]="'status-' + element.status.toLowerCase()">{{ element.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button [routerLink]="['/detail', element.id]" matTooltip="View details">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" (page)="onPageChange($event)">
  </mat-paginator>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>
</div>
