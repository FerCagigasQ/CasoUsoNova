<h2 mat-dialog-title>File a Claim</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Claimed Amount</mat-label>
      <input matInput type="number" formControlName="claimedAmount">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Reason</mat-label>
      <textarea matInput formControlName="reason" rows="4" placeholder="Describe the grounds for this claim..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="warn" (click)="submit()" [disabled]="form.invalid">Submit Claim</button>
</mat-dialog-actions>
