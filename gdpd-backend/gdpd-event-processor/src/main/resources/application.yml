spring:
  application:
    name: gdpd-event-processor
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    hibernate:
      ddl-auto: validate
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      fail-fast: true
    stream:
      bindings:
        pedidos-events-in-0:
          destination: pedidos-events
          group: gdpd-event-processor
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000

# Actuator: Health Check, Metrics, Info
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    diskspace:
      threshold: 1GB
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: 9080

---
spring:
  config:
    activate:
      on-profile: dev,int
  datasource:
    url: jdbc:postgresql://localhost:5555/gdpddb
    username: nova
    password: nova
    hikari:
      maximum-pool-size: 5

  rabbitmq:
    host: localhost
    port: 61616
    username: guest
    password: guest

logging:
  level:
    root: INFO
    com.bbva.gdpd: DEBUG
    org.springframework: INFO

---
spring:
  config:
    activate:
      on-profile: pre,pro
  datasource:
    url: jdbc:postgresql://db-${spring.profiles.active}.nova:5432/gdpddb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  rabbitmq:
    host: activemq-${spring.profiles.active}.nova
    port: 61616
    username: ${BROKER_USER}
    password: ${BROKER_PASSWORD}
    ssl: true

logging:
  level:
    root: WARN
    com.bbva.gdpd: INFO
