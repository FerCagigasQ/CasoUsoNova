server:
  port: 8082

spring:
  application:
    name: gdpd-event-processor
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  datasource:
    url: jdbc:postgresql://localhost:5432/novadb
    username: nova
    password: nova
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    config:
      enabled: false
  sleuth:
    sampler:
      rate: 1.0
  zipkin:
    base-url: http://localhost:9411

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        step: 30s
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 500ms,1s,2s

logging:
  pattern:
    level: "%5p [%X{traceId},%X{spanId}]"
  level:
    com.bbva.gdpd: DEBUG
