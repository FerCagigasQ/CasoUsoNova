server:
  port: 8082

spring:
  application:
    name: gdpd-event-processor
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  datasource:
    url: jdbc:postgresql://localhost:5432/novadb
    username: nova
    password: nova
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    config:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.bbva.gdpd: DEBUG
