uuaa: gdpd
info:
  build:
    groupId: "@project.groupId@"
    artifact: "@project.artifactId@"
    version: "@project.version@"
management:
  endpoints:
    web:
      exposure:
        include: "health,info,mappings"
        exclude: shutdown
  endpoint:
    health:
      show-details: ALWAYS
logging:
  path: ${LOG_PATH:.}
  level:
    ROOT: INFO
server:
  port: ${NOVA_PORT:8080}
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5555/gdpddb
    username: nova
    password: nova
    driver-class-name: org.postgresql.Driver
  cloud:
    stream:
      bindings:
        pedidosEventsOut-out-0:
          destination: pedidos-events
      rabbit:
        bindings:
          pedidosEventsOut-out-0:
            producer:
              auto-bind-dlq: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
