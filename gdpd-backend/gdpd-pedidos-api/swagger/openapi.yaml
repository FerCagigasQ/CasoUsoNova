openapi: "3.0.3"
info:
  title: GDPD Pedidos API
  description: API REST de gestión de pedidos para el producto GDPD
  version: "1.0.0"
  contact:
    name: GDPD Team
servers:
  - url: http://localhost:8080
    description: Entorno local
paths:
  /api/pedidos:
    get:
      summary: Listar todos los pedidos
      operationId: getAllPedidos
      tags: [Pedidos]
      responses:
        "200":
          description: Lista de pedidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pedido"
    post:
      summary: Crear nuevo pedido
      operationId: createPedido
      tags: [Pedidos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pedido"
      responses:
        "201":
          description: Pedido creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
  /api/pedidos/{id}:
    get:
      summary: Obtener pedido por ID
      operationId: getPedidoById
      tags: [Pedidos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
        "404":
          description: Pedido no encontrado
    put:
      summary: Actualizar pedido
      operationId: updatePedido
      tags: [Pedidos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pedido"
      responses:
        "200":
          description: Pedido actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
        "404":
          description: Pedido no encontrado
    delete:
      summary: Eliminar pedido
      operationId: deletePedido
      tags: [Pedidos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Pedido eliminado
        "404":
          description: Pedido no encontrado
  /api/pedidos/eventos:
    get:
      summary: Stream SSE de eventos de pedidos
      operationId: streamEventos
      tags: [Pedidos]
      responses:
        "200":
          description: Stream de eventos
          content:
            text/event-stream:
              schema:
                type: string
components:
  schemas:
    Pedido:
      type: object
      required: [referencia, estado]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        referencia:
          type: string
        descripcion:
          type: string
        estado:
          $ref: "#/components/schemas/EstadoPedido"
        fechaCreacion:
          type: string
          format: date-time
          readOnly: true
        importeTotal:
          type: number
          format: double
    EstadoPedido:
      type: string
      enum: [PENDIENTE, EN_PROCESO, COMPLETADO, CANCELADO]
