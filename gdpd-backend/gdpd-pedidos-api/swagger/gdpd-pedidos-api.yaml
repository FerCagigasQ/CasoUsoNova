openapi: "3.0.3"
info:
  title: GDPD Pedidos API
  description: |
    API REST de gestión de pedidos para la plataforma NOVA.
    Expone operaciones CRUD sobre pedidos y consulta del historial de eventos/cambios de estado.
  version: "1.0.0"
  contact:
    name: Equipo GDPD
    email: gdpd-team@bbva.com
  license:
    name: Internal BBVA
servers:
  - url: /api/v1
    description: Base path

security:
  - bearerAuth: []

tags:
  - name: pedidos
    description: Gestión de pedidos

paths:
  /pedidos:
    get:
      tags: [pedidos]
      operationId: listarPedidos
      summary: Listar pedidos
      description: Devuelve una lista paginada de pedidos con soporte de filtrado por estado y cliente.
      parameters:
        - name: estado
          in: query
          description: Filtrar por estado del pedido
          required: false
          schema:
            type: string
            enum: [PENDIENTE, CONFIRMADO, ENVIADO, ENTREGADO, CANCELADO]
        - name: clienteId
          in: query
          description: Filtrar por identificador del cliente
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Lista de pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [pedidos]
      operationId: crearPedido
      summary: Crear pedido
      description: Crea un nuevo pedido en el sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearPedidoRequest'
      responses:
        '201':
          description: Pedido creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /pedidos/{id}:
    get:
      tags: [pedidos]
      operationId: obtenerPedido
      summary: Obtener pedido por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Detalle del pedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [pedidos]
      operationId: actualizarPedido
      summary: Actualizar pedido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarPedidoRequest'
      responses:
        '200':
          description: Pedido actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [pedidos]
      operationId: eliminarPedido
      summary: Eliminar pedido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Pedido eliminado
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    PedidoDTO:
      type: object
      required:
        - id
        - clienteId
        - estado
        - fechaCreacion
        - lineas
      properties:
        id:
          type: integer
          format: int64
          example: 1
        clienteId:
          type: string
          example: "CLI-001"
        estado:
          type: string
          enum: [PENDIENTE, CONFIRMADO, ENVIADO, ENTREGADO, CANCELADO]
          example: PENDIENTE
        fechaCreacion:
          type: string
          format: date-time
        lineas:
          type: array
          items:
            $ref: '#/components/schemas/LineaPedidoDTO'

    LineaPedidoDTO:
      type: object
      required:
        - codigoProducto
        - cantidad
        - precioUnitario
      properties:
        id:
          type: integer
          format: int64
        codigoProducto:
          type: string
          example: "PROD-001"
        descripcion:
          type: string
          example: "Producto A"
        cantidad:
          type: integer
          minimum: 1
          example: 5
        precioUnitario:
          type: number
          format: decimal
          example: 100.00

    CrearPedidoRequest:
      type: object
      required:
        - clienteId
        - lineas
      properties:
        clienteId:
          type: string
          example: "CLI-001"
        lineas:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CrearLineaRequest'

    CrearLineaRequest:
      type: object
      required:
        - codigoProducto
        - cantidad
        - precioUnitario
      properties:
        codigoProducto:
          type: string
          example: "PROD-001"
        descripcion:
          type: string
          example: "Producto A"
        cantidad:
          type: integer
          minimum: 1
          example: 5
        precioUnitario:
          type: number
          minimum: 0
          example: 100.00

    ActualizarPedidoRequest:
      type: object
      properties:
        estado:
          type: string
          enum: [PENDIENTE, CONFIRMADO, ENVIADO, ENTREGADO, CANCELADO]

    PedidoListResponse:
      type: object
      properties:
        contenido:
          type: array
          items:
            $ref: '#/components/schemas/PedidoDTO'
        numeroPagina:
          type: integer
        tamanioPagina:
          type: integer
        totalElementos:
          type: integer

    ErrorResponse:
      type: object
      required:
        - codigo
        - mensaje
      properties:
        codigo:
          type: string
          example: "GDPD-001"
        mensaje:
          type: string
          example: "El pedido no existe"
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
