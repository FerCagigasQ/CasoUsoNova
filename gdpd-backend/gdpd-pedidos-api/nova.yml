subsistema: gdpd-backend
servicio:
  nombre: gdpd-pedidos-api
  tipo: api
  tecnologia: java11
  puerto: 8080
dependencias:
  brokers:
    - nombre: gdpd.pedidos.eventos
      tipo: queue
propiedades:
  - nombre: spring.datasource.url
    entorno:
      dev: jdbc:postgresql://localhost:5432/novadb
      int: jdbc:postgresql://db-int.nova:5432/novadb
      pre: jdbc:postgresql://db-pre.nova:5432/novadb
      pro: jdbc:postgresql://db-pro.nova:5432/novadb
recursos:
  cpu: 512m
  memoria: 1Gi
  replicas:
    min: 1
    max: 4
