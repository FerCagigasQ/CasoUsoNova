server:
  port: 8083
spring:
  application:
    name: gdpd-scheduler-reportes
  cloud:
    config:
      enabled: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
logging:
  level:
    com.bbva.gdpd: DEBUG
gdpd:
  batch:
    service:
      url: http://gdpd-batch-reportes
    reportes:
      cron: "0 0 1 * * MON-FRI"
