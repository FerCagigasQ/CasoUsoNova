subsistema: gdpd
servicio:
  nombre: gdpd-scheduler-reportes
  tipo: scheduler
  tecnologia: java11
propiedades:
  - nombre: gdpd.batch.service.url
    entorno:
      dev: http://gdpd-batch-reportes
      int: http://gdpd-batch-reportes.int
      pre: http://gdpd-batch-reportes.pre
      pro: http://gdpd-batch-reportes.pro
  - nombre: eureka.client.service-url.defaultZone
    entorno:
      dev: http://localhost:8761/eureka/
      int: http://eureka-int:8761/eureka/
      pre: http://eureka-pre:8761/eureka/
      pro: http://eureka-pro:8761/eureka/
recursos:
  cpu: 128m
  memoria: 256Mi
