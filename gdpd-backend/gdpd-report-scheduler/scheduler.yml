novaScheduler:
  init:
    trigger:
      - type: cron
        description: "Lanzar batch de reportes GDPD diariamente a las 2:00 AM"
        relatedContextParams:
          - ctx.trigger
    defaultStep: LanzarBatchStep
  novaStep:
    - name: LanzarBatchStep
      novaJob:
        - name: gdpdreportbatch
          type: batch
          serviceName: gdpd-report-batch
      defaultStep: EndSuccess
  ends:
    - name: EndSuccess
    - name: EndError
