schema: paperclip/v1

company:
  requireBoardApprovalForNewAgents: false
  brandColor: "#004481"
  budgetMonthlyCents: 55000

agents:
  nova-architect:
    role: ceo
    budgetMonthlyCents: 12000
    permissions:
      canCreateAgents: true
    adapter:
      type: claude_local
      config: {}
    inputs:
      env:
        COSMOS_CLI_TOKEN:
          kind: secret
          requirement: required
          description: Token de autenticación de la CLI COSMOS/NOVA
        NOVA_HOME:
          kind: plain
          requirement: required
          description: Ruta raíz del toolchain nova-le (contiene nova-cli/, tools/, generators/, nodejs/)
          default: /opt/nova
        NOVA_CLI_PATH:
          kind: plain
          requirement: required
          description: Ruta al entry point del NOVA CLI
          default: /opt/nova/nova-cli/bin/nova.js

  nova-service-gen:
    role: engineer
    reportsTo: nova-architect
    budgetMonthlyCents: 10000
    adapter:
      type: claude_local
      config: {}
    runtime:
      stack:
        java: "11"
        springBoot: "2.7.x"
        maven: "3.8"
        springCloud: "2021.0.x"
      novaServiceTypes:
        - api
        - demon
        - batch
        - scheduler
    inputs:
      env:
        NOVA_HOME:
          kind: plain
          requirement: required
          description: Ruta raíz del toolchain nova-le
          default: /opt/nova
        JAVA_HOME:
          kind: plain
          requirement: required
          description: Zulu JDK 11 (sustituido en nova-le/tools/java/)
          default: /opt/nova/tools/java
        MAVEN_HOME:
          kind: plain
          requirement: required
          description: Apache Maven con settings.xml NOVA (Nexus)
          default: /opt/nova/tools/maven

  nova-frontend-gen:
    role: engineer
    reportsTo: nova-architect
    budgetMonthlyCents: 8000
    adapter:
      type: claude_local
      config: {}
    runtime:
      stack:
        angular: "12+"
        typescript: "4.x"
        node: "16+"
        thin3: "latest"
    inputs:
      env:
        NOVA_HOME:
          kind: plain
          requirement: required
          description: Ruta raíz del toolchain nova-le
          default: /opt/nova
        NODE_HOME:
          kind: plain
          requirement: required
          description: Node.js embebido en nova-le (incluye npm + yarn)
          default: /opt/nova/nodejs
        PREPARE_APIS_SCRIPT:
          kind: plain
          requirement: optional
          description: Ruta a prepare-apis-generated.js v2.0.1 (compila e instala librerías Angular generadas)
          default: /opt/prepare-apis-generated.js

  nova-api-integr:
    role: engineer
    reportsTo: nova-service-gen
    budgetMonthlyCents: 7000
    adapter:
      type: claude_local
      config: {}

  nova-async-comm:
    role: engineer
    reportsTo: nova-service-gen
    budgetMonthlyCents: 7000
    adapter:
      type: claude_local
      config: {}
    inputs:
      env:
        ACTIVEMQ_BROKER_URL:
          kind: plain
          requirement: required
          description: URL del broker ActiveMQ local
          default: tcp://localhost:61616

  nova-release-mgr:
    role: devops
    reportsTo: nova-architect
    budgetMonthlyCents: 6000
    adapter:
      type: claude_local
      config: {}

  nova-ops-monitor:
    role: devops
    reportsTo: nova-release-mgr
    budgetMonthlyCents: 5000
    adapter:
      type: claude_local
      config: {}
    inputs:
      env:
        NOVA_CONFIG_SERVER_URL:
          kind: plain
          requirement: required
          description: URL del Spring Cloud Config Server NOVA
          default: http://localhost:8888
