version: '3.8'

services:
  backend:
    build: ./guarantees-service
    container_name: guarantees-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guarantees-network

  frontend:
    build: ./guarantees-ui
    container_name: guarantees-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guarantees-network

networks:
  guarantees-network:
    driver: bridge
