version: '3.8'

services:
  backend:
    build:
      context: ./guarantees-service
      dockerfile: Dockerfile
    container_name: guarantees-backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - guarantees-network

  frontend:
    build:
      context: ./guarantees-ui
      dockerfile: Dockerfile
    container_name: guarantees-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guarantees-network

networks:
  guarantees-network:
    driver: bridge
