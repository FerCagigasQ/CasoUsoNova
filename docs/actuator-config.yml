# Spring Boot Actuator + Micrometer — Configuración GDPD
# Aplicar en application.yml de cada servicio (gdpd-pedidos-api, gdpd-event-processor, etc.)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # /actuator/health/liveness + /actuator/health/readiness
    loggers:
      enabled: true
  health:
    db:
      enabled: true
    diskSpace:
      enabled: true
    jms:
      enabled: true
    eureka:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      sla:
        http.server.requests: 500ms, 1s, 2s
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:dev}
      version: @project.version@

info:
  app:
    name: ${spring.application.name}
    description: "Servicio GDPD - Gestión de Pedidos"
    version: @project.version@
    build-time: @maven.build.timestamp@
  java:
    version: ${java.version}
  spring:
    boot-version: @spring-boot.version@
