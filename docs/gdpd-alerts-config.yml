# GDPD Alerting Configuration
# Para importar en Portal NOVA → Operaciones → Configuración de Alertas

alertas:
  # === CRÍTICAS (Respuesta inmediata) ===

  - id: gdpd-servicio-caido-api
    nombre: "CRÍTICA: Servicio API caído"
    descripcion: "gdpd-pedidos-api no responde a health check"
    servicio: gdpd-pedidos-api
    tipo: health-check
    metrica: /actuator/health
    condicion:
      operador: "!="
      valor: "UP"
    duracion_evaluacion: 1m
    severidad: CRITICAL
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com
      - tipo: sms
        destinatario: oncall-gdpd
      - tipo: escalado
        gira: gdpd-24x7
    acciones_automaticas:
      - tipo: registrar_evento
        detalles: "Servicio caído"
      - tipo: crear_ticket
        prioridad: P1
        asignado_a: "Tech Lead Backend"

  - id: gdpd-bd-no-disponible
    nombre: "CRÍTICA: Base de Datos no disponible"
    descripcion: "PostgreSQL desconectado de todos los servicios"
    servicio: "ALL"
    tipo: component-health
    metrica: /actuator/health/db
    condicion:
      operador: "!="
      valor: "UP"
    duracion_evaluacion: 1m
    severidad: CRITICAL
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com
      - tipo: email
        destinatario: dba-team@bbva.com
      - tipo: sms
        destinatario: oncall-gdpd
    acciones_automaticas:
      - tipo: crear_ticket
        prioridad: P1
        asignado_a: "DBA on-call"

  - id: gdpd-broker-down
    nombre: "CRÍTICA: Message Broker caído"
    descripcion: "RabbitMQ/ActiveMQ no disponible"
    servicio: gdpd-pedidos-api
    tipo: component-health
    metrica: /actuator/health/rabbit
    condicion:
      operador: "!="
      valor: "UP"
    duracion_evaluacion: 2m
    severidad: CRITICAL
    canales_notificacion:
      - tipo: email
        destinatario: middleware-team@bbva.com
      - tipo: sms
        destinatario: oncall-gdpd

  # === ALTAS (Atención en 15 min) ===

  - id: gdpd-cola-llena
    nombre: "ALTA: Cola de mensajes > 1000"
    descripcion: "RabbitMQ acumulando más de 1000 mensajes no procesados"
    servicio: gdpd-event-processor
    tipo: metric
    metrica: spring.cloud.stream.binder.rabbit.messages.waiting
    condicion:
      operador: ">"
      valor: 1000
    duracion_evaluacion: 5m
    severidad: HIGH
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com
      - tipo: email
        destinatario: middleware-team@bbva.com
    acciones_automaticas:
      - tipo: registrar_evento
        detalles: "Cola bloqueada"

  - id: gdpd-error-rate-alto
    nombre: "ALTA: Error Rate > 1%"
    descripcion: "Más del 1% de requests retornando errores 5XX"
    servicio: gdpd-pedidos-api
    tipo: metric
    metrica: "rate(http_server_requests_seconds_count{status=~'5..',service='gdpd-pedidos-api'}[5m]) / rate(http_server_requests_seconds_count{service='gdpd-pedidos-api'}[5m])"
    condicion:
      operador: ">"
      valor: 0.01
    duracion_evaluacion: 2m
    severidad: HIGH
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com
      - tipo: sms
        destinatario: oncall-gdpd
    acciones_automaticas:
      - tipo: crear_ticket
        prioridad: P2
        asignado_a: "Backend Team"

  - id: gdpd-latencia-alta
    nombre: "ALTA: Latencia P95 > 2 segundos"
    descripcion: "Percentil 95 de latencia HTTP excede 2 segundos"
    servicio: gdpd-pedidos-api
    tipo: metric
    metrica: "histogram_quantile(0.95, http_server_requests_seconds_bucket{service='gdpd-pedidos-api'})"
    condicion:
      operador: ">"
      valor: 2.0
    duracion_evaluacion: 5m
    severidad: HIGH
    canales_notificacion:
      - tipo: email
        destinatario: performance-team@bbva.com

  # === WARNINGS (Monitoreo) ===

  - id: gdpd-heap-alto
    nombre: "WARNING: Heap Memory > 80%"
    descripcion: "Memoria heap JVM utilizando más del 80%"
    servicio: "ALL"
    tipo: metric
    metrica: "jvm_memory_used_bytes{area='heap'} / jvm_memory_max_bytes{area='heap'}"
    condicion:
      operador: ">"
      valor: 0.80
    duracion_evaluacion: 10m
    severidad: WARNING
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com
      - tipo: email
        destinatario: infra-team@bbva.com
    acciones_automaticas:
      - tipo: registrar_evento
        detalles: "Posible memory leak"

  - id: gdpd-cpu-alto
    nombre: "WARNING: CPU > 85%"
    descripcion: "Utilización CPU del sistema > 85%"
    servicio: "ALL"
    tipo: metric
    metrica: system_cpu_usage
    condicion:
      operador: ">"
      valor: 0.85
    duracion_evaluacion: 5m
    severidad: WARNING
    canales_notificacion:
      - tipo: email
        destinatario: infra-team@bbva.com

  - id: gdpd-consumer-lag
    nombre: "WARNING: Consumer Lag > 500"
    descripcion: "gdpd-event-processor atrasado más de 500 mensajes"
    servicio: gdpd-event-processor
    tipo: metric
    metrica: "spring.cloud.stream.binder.rabbit.consumer.lag"
    condicion:
      operador: ">"
      valor: 500
    duracion_evaluacion: 15m
    severidad: WARNING
    canales_notificacion:
      - tipo: email
        destinatario: middleware-team@bbva.com

  - id: gdpd-threads-alto
    nombre: "WARNING: Thread Count > 200"
    descripcion: "Número de threads activos > 200"
    servicio: "ALL"
    tipo: metric
    metrica: jvm_threads_live
    condicion:
      operador: ">"
      valor: 200
    duracion_evaluacion: 5m
    severidad: WARNING
    canales_notificacion:
      - tipo: email
        destinatario: oncall-gdpd@bbva.com

# === Configuración Global de Escalación ===

escalacion:
  critica:
    - minutos: 0
      accion: "SMS + Email inmediato"
    - minutos: 15
      accion: "Conferencia con Tech Lead"
    - minutos: 30
      accion: "Escalada a CTO"

  alta:
    - minutos: 0
      accion: "Email inmediato"
    - minutos: 20
      accion: "Conferencia técnica"
    - minutos: 45
      accion: "Escalada a Arquitecto"

  warning:
    - minutos: 0
      accion: "Registrar en dashboard"
    - minutos: 60
      accion: "Email summary"

# === Ventanas de Mantenimiento (Sin Alertas) ===

maintenance_windows:
  - nombre: "Martes Deploy"
    dia: martes
    hora_inicio: "22:00"
    hora_fin: "23:30"
    servicios: ["gdpd-pedidos-api", "gdpd-event-processor"]

  - nombre: "Domingo Backup"
    dia: domingo
    hora_inicio: "02:00"
    hora_fin: "03:00"
    servicios: ["ALL"]
