# Prometheus Alert Rules — GDPD (Gestión de Pedidos)
# Desplegar en: /etc/prometheus/rules/gdpd-alerts.yml

groups:
  - name: gdpd_availability
    interval: 30s
    rules:
      - alert: GdpdServicioCaido
        expr: up{job=~"gdpd.*"} == 0
        for: 30s
        labels:
          severity: critical
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Servicio GDPD caído: {{ $labels.job }}"
          description: "El servicio {{ $labels.job }} no responde. Verificar con: nova runtime status"
          runbook: "https://wiki.nova/runbooks/gdpd-servicio-caido"

  - name: gdpd_resources
    interval: 60s
    rules:
      - alert: GdpdCpuAlta
        expr: process_cpu_usage{application=~"gdpd.*"} > 0.80
        for: 2m
        labels:
          severity: warning
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "CPU alta en {{ $labels.application }} ({{ $value | humanizePercentage }})"
          description: "CPU al {{ $value | humanizePercentage }} durante más de 2 minutos. Umbral: 80%."
          runbook: "https://wiki.nova/runbooks/gdpd-cpu-alta"

      - alert: GdpdMemoriaAlta
        expr: |
          jvm_memory_used_bytes{application=~"gdpd.*", area="heap"}
          /
          jvm_memory_max_bytes{application=~"gdpd.*", area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Memoria heap alta en {{ $labels.application }} ({{ $value | humanizePercentage }})"
          description: "Heap JVM al {{ $value | humanizePercentage }}. Posible memory leak."
          runbook: "https://wiki.nova/runbooks/gdpd-memoria-alta"

      - alert: GdpdMemoriaCritica
        expr: |
          jvm_memory_used_bytes{application=~"gdpd.*", area="heap"}
          /
          jvm_memory_max_bytes{application=~"gdpd.*", area="heap"}
          > 0.95
        for: 1m
        labels:
          severity: critical
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Memoria CRÍTICA en {{ $labels.application }} ({{ $value | humanizePercentage }})"
          description: "OOM inminente. Reiniciar servicio y analizar heap dump."
          runbook: "https://wiki.nova/runbooks/gdpd-oom"

      - alert: GdpdPoolBdSaturado
        expr: hikaricp_connections_pending{application=~"gdpd.*"} > 5
        for: 2m
        labels:
          severity: warning
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Pool BD saturado en {{ $labels.application }}"
          description: "{{ $value }} conexiones en espera. Revisar consultas lentas."

  - name: gdpd_http
    interval: 30s
    rules:
      - alert: GdpdErrores5xx
        expr: |
          rate(http_server_requests_seconds_count{
            application=~"gdpd.*",
            status=~"5.."
          }[1m]) > 5
        for: 1m
        labels:
          severity: critical
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Tasa de errores 5xx alta en {{ $labels.application }}"
          description: "{{ $value | humanize }} errores/min en {{ $labels.uri }}. Revisar logs de error."
          runbook: "https://wiki.nova/runbooks/gdpd-errores-5xx"

      - alert: GdpdLatenciaAlta
        expr: |
          histogram_quantile(0.99,
            rate(http_server_requests_seconds_bucket{
              application=~"gdpd.*"
            }[5m])
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Latencia p99 alta en {{ $labels.application }}"
          description: "P99 = {{ $value | humanizeDuration }}. Umbral: 2s. Revisar Zipkin."

  - name: gdpd_messaging
    interval: 30s
    rules:
      - alert: GdpdBrokerDesconectado
        expr: |
          absent(up{job="gdpd-event-processor"}) == 1
          or spring_integration_channels_errorRate{application="gdpd-event-processor"} > 0.1
        for: 1m
        labels:
          severity: critical
          team: gdpd-ops
          uuaa: GDPD
        annotations:
          summary: "Broker desconectado — gdpd-event-processor"
          description: "El daemon no puede conectar al message broker. Revisar ActiveMQ/RabbitMQ."
          runbook: "https://wiki.nova/runbooks/gdpd-broker-caido"

  - name: gdpd_business
    interval: 60s
    rules:
      - alert: GdpdSinPedidos
        expr: |
          rate(gdpd_pedidos_creados_total[10m]) == 0
        for: 15m
        labels:
          severity: warning
          team: gdpd-negocio
          uuaa: GDPD
        annotations:
          summary: "Sin pedidos creados en los últimos 15 minutos"
          description: "Posible problema de acceso de clientes o error silencioso en la API."
