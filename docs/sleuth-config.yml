# Spring Cloud Sleuth Configuration for GDPD Services
# Distributed Tracing & Correlation IDs
# Reference: https://spring.io/projects/spring-cloud-sleuth

---
# ============================================================
# Configuración Global de Sleuth
# ============================================================

spring:
  cloud:
    sleuth:
      enabled: true
      trace-id:
        # Usar UUID en lugar de números
        hex-encoding: true
      span-id:
        hex-encoding: true
      # Filtros de exclusión (ignorar health checks, metrics, etc)
      web:
        client:
          enabled: true
        enabled: true
      # Sampler: controla qué traces se registran
      sampler:
        # ProbabilityBasedSampler: 100% de sampling en dev/int, 10% en pre/pro
        type: probability
        probability: 1.0  # Overridden por perfil
      # Inicialización de trace IDs
      trace-id:
        hex-encoding: true
      # Propagación de contexto (para llamadas entre servicios)
      propagation:
        type: w3c,b3  # W3C y B3 propagation

---
# Configuración por Entorno

# ============================================================
# Desarrollo/Integración (DEV/INT)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: dev,int
  cloud:
    sleuth:
      sampler:
        type: always_sampler  # 100% sampling en desarrollo

logging:
  level:
    # Mostrar trace IDs en logs
    org.springframework.cloud.sleuth: DEBUG
    # Reducir ruido de frameworks
    org.springframework: INFO
    org.hibernate: WARN

# ============================================================
# Preproducción/Producción (PRE/PRO)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: pre,pro
  cloud:
    sleuth:
      sampler:
        type: probability
        probability: 0.10  # 10% sampling para no saturar Zipkin
      # Envío a Zipkin en producción
      zipkin:
        enabled: true
        base-url: ${ZIPKIN_URL:http://zipkin.nova:9411}
        api-path: /api/v2/spans
        sender:
          type: web
        # Configuración de batch
        message-timeout: 1s
        compression: gzip

logging:
  level:
    org.springframework.cloud.sleuth: INFO

---
# ============================================================
# Métricas de Tracing
# ============================================================

management:
  metrics:
    distribution:
      percentiles-histogram:
        spring.cloud.sleuth.span.http.requests: true
    tags:
      # Tag de tracing en todas las métricas
      trace_id: ${spring.cloud.sleuth.trace-id}

---
# ============================================================
# Integración con Logback (JSON Logging)
# ============================================================

# Archivo: logback-spring.xml
logback_configuration: |
  <?xml version="1.0" encoding="UTF-8"?>
  <configuration>
    <springProperty name="APP_NAME" source="spring.application.name"/>
    <springProperty name="PROFILE" source="spring.profiles.active" defaultValue="dev"/>

    <!-- Configuración de Sleuth para incluir trace/span IDs -->
    <springProfile name="pro,pre">
      <appender name="JSON" class="ch.qos.logback.core.ConsoleAppender">
        <encoder class="net.logstash.logback.encoder.LogstashEncoder">
          <!-- Incluir trace/span ID de Sleuth en JSON -->
          <fieldNames>
            <timestamp>@timestamp</timestamp>
            <version>[ignore]</version>
            <mdcProperties>tracing</mdcProperties>
          </fieldNames>
          <customFields>
            {
              "app":"${APP_NAME}",
              "env":"${PROFILE}",
              "uuaa":"GDPD",
              "traceId":"%X{traceId}",
              "spanId":"%X{spanId}",
              "spanExportable":"%X{spanExportable}",
              "spanTraceId":"%X{spanTraceId}",
              "spanParentId":"%X{spanParentId}"
            }
          </customFields>
          <providers>
            <timestamp/>
            <version/>
            <logLevel/>
            <message/>
            <loggerName/>
            <threadName/>
            <context/>
            <stackTrace/>
            <taggedArguments/>
            <mdcFields/>
            <callerData/>
            <logstashMarkers/>
          </providers>
        </encoder>
      </appender>
      <root level="INFO">
        <appender-ref ref="JSON"/>
      </root>
    </springProfile>

    <!-- Desarrollo: legible con trace IDs -->
    <springProfile name="dev,int">
      <appender name="CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <!-- Patrón que incluye trace/span ID -->
          <pattern>
            %d{HH:mm:ss.SSS}
            [%thread]
            %-5level
            %logger{36}
            [traceId=%X{traceId} spanId=%X{spanId}]
            - %msg%n
          </pattern>
        </encoder>
      </appender>
      <root level="DEBUG">
        <appender-ref ref="CONSOLE"/>
      </root>
      <logger name="org.springframework.cloud.sleuth" level="DEBUG"/>
      <logger name="org.springframework" level="INFO"/>
    </springProfile>
  </configuration>

---
# ============================================================
# Correlation ID (Cabecera HTTP)
# ============================================================

http_headers:
  # Headers que Sleuth propaga automáticamente
  - X-Trace-Id  # Trace ID único
  - X-Span-Id   # Span ID del request
  - X-Parent-Span-Id  # Span parent
  - B3  # B3 propagation format
  - W3C-Trace-Context  # W3C standard

# Uso en código:
correlation_id_usage: |
  @RestController
  public class PedidosController {

    @Autowired
    private Tracer tracer;

    @PostMapping("/pedidos")
    public ResponseEntity<Pedido> crearPedido(@RequestBody Pedido pedido) {
      // Sleuth automáticamente crea un span para este request
      Span span = tracer.currentSpan();

      // Trace ID disponible en logs automáticamente
      log.info("Creando pedido para cliente: {}", pedido.getClienteId());
      // Log contendrá: [traceId=... spanId=...]

      // Crear spans personalizados si es necesario
      Span childSpan = tracer.nextSpan().name("validar-pedido");
      try (Tracer.SpanInScope spanInScope = tracer.withSpan(childSpan)) {
        validarPedido(pedido);
      } finally {
        childSpan.finish();
      }

      return ResponseEntity.ok(pedido);
    }
  }

---
# ============================================================
# Llamadas entre Servicios (Service-to-Service Tracing)
# ============================================================

service_calls: |
  // Cuando gdpd-pedidos-api llama a gdpd-event-processor

  @Service
  public class EventPublisher {

    @Autowired
    private RestTemplate restTemplate;

    @Autowired
    private Tracer tracer;

    public void publicarEvento(Evento evento) {
      // Sleuth automáticamente propaga trace ID en HTTP headers
      HttpHeaders headers = new HttpHeaders();
      headers.set("X-Trace-Id", tracer.currentSpan().context().traceIdString());

      HttpEntity<Evento> request = new HttpEntity<>(evento, headers);

      // RestTemplate automáticamente incluye headers de Sleuth
      restTemplate.postForObject(
        "http://gdpd-event-processor:9080/procesar",
        request,
        String.class
      );
      // Trace ID se propaga automáticamente al servicio destino
    }
  }

---
# ============================================================
# Configuración de Zipkin (Distributed Tracing Backend)
# ============================================================

zipkin_configuration:
  enabled_in: pre,pro
  base_url: http://zipkin.nova:9411
  endpoints:
    spans: /api/v2/spans
    traces: /api/v1/traces
    services: /api/v1/services

  docker_compose: |
    zipkin:
      image: openzipkin/zipkin:latest
      ports:
        - "9411:9411"
      environment:
        - STORAGE_TYPE=elasticsearch
        - ES_HOSTS=elasticsearch:9200

  features:
    - "Visualización de traces distribuidos"
    - "Latencia end-to-end entre servicios"
    - "Análisis de dependencias de servicios"
    - "Identificación de cuellos de botella"

---
# ============================================================
# Dashboards Grafana + Tempo (Alternativa a Zipkin)
# ============================================================

tempo_configuration:
  description: "Alternativa moderna a Zipkin con mejor compresión"
  enabled_in: pro
  docker_compose: |
    tempo:
      image: grafana/tempo:latest
      ports:
        - "3200:3200"
      command: -config.file=/etc/tempo.yaml

tempo_tempo_yaml: |
  server:
    http_listen_port: 3200
  distributor:
    rate_limit_bytes: 10485760
  ingester:
    max_block_duration: 5m
  compactor:
    compaction:
      compacted_block_retention: 10m
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  querier:
    frontend_worker:
      frontend_address: tempo:3200

---
# ============================================================
# Archivos Maven a incluir
# ============================================================

maven_dependencies: |
  <!-- Spring Cloud Sleuth -->
  <dependency>
    <groupId>org.springframework.cloud</groupId>
    <artifactId>spring-cloud-starter-sleuth</artifactId>
  </dependency>

  <!-- Opcional: Zipkin Reporter para enviar traces -->
  <dependency>
    <groupId>org.springframework.cloud</groupId>
    <artifactId>spring-cloud-sleuth-zipkin</artifactId>
  </dependency>

  <!-- Opcional: Brave (reemplaza Sleuth a nivel bajo) -->
  <dependency>
    <groupId>io.zipkin.brave</groupId>
    <artifactId>brave-spring-beans</artifactId>
  </dependency>

---
# ============================================================
# Verificación de Traces
# ============================================================

verification_commands:
  # Ver logs con trace ID incluido
  - "kubectl logs -f gdpd-pedidos-api | grep traceId"

  # Buscar trace específico en Zipkin
  - "curl http://localhost:9411/api/v1/traces?serviceName=gdpd-pedidos-api"

  # Ver latencia de span específico
  - "curl http://localhost:9411/api/v1/services"

  # Análisis de dependencias
  - "curl http://localhost:9411/api/v1/dependencies"

---
# ============================================================
# Troubleshooting
# ============================================================

troubleshooting:
  "Trace ID no aparece en logs":
    solution: "Verificar que Logback está configurado con %X{traceId}"

  "Zipkin no recibe traces":
    solution: "Comprobar que spring.cloud.sleuth.zipkin.base-url es correcto"

  "Alto overhead de Sleuth":
    solution: "Reducir sampling probability a 0.01 (1%)"

  "Traces incompletos":
    solution: "Verificar que RestTemplate usa interceptores de Sleuth"

