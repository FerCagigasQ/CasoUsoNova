openapi: 3.0.3
info:
  title: GDPD Pedidos API
  description: API for managing orders (pedidos) with Server-Sent Events support
  version: 1.0.0
servers:
  - url: http://localhost:8080
  - url: http://localhost:24000/gdpd/pedidos-api/1.0.0
paths:
  /api/v1/pedidos:
    get:
      summary: Listar todos los pedidos
      operationId: listPedidos
      tags:
        - Pedidos
      responses:
        '200':
          description: Lista de pedidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pedido'
    post:
      summary: Crear un nuevo pedido
      operationId: createPedido
      tags:
        - Pedidos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePedidoRequest'
      responses:
        '201':
          description: Pedido creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
  /api/v1/pedidos/{id}:
    get:
      summary: Obtener un pedido por ID
      operationId: getPedido
      tags:
        - Pedidos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
        '404':
          description: Pedido no encontrado
    put:
      summary: Actualizar un pedido
      operationId: updatePedido
      tags:
        - Pedidos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePedidoRequest'
      responses:
        '200':
          description: Pedido actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
    delete:
      summary: Eliminar un pedido
      operationId: deletePedido
      tags:
        - Pedidos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Pedido eliminado exitosamente
  /api/v1/pedidos/{id}/estado:
    patch:
      summary: Cambiar el estado de un pedido
      operationId: updatePedidoEstado
      tags:
        - Pedidos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstadoRequest'
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
  /api/v1/pedidos/eventos:
    get:
      summary: Stream de eventos de pedidos (Server-Sent Events)
      operationId: streamPedidosEventos
      tags:
        - Eventos
      responses:
        '200':
          description: Stream de eventos abierto
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  event:
                    type: string
                    enum: [pedido-creado, pedido-actualizado, pedido-eliminado]
                  data:
                    type: string
components:
  schemas:
    Pedido:
      type: object
      required:
        - id
        - referencia
        - estado
        - fechaCreacion
      properties:
        id:
          type: string
          description: Identificador único del pedido
          example: "pedido-001"
        referencia:
          type: string
          description: Referencia única del pedido para el cliente
          example: "REF-2024-001"
        descripcion:
          type: string
          description: Descripción del pedido
          example: "Pedido de materiales de oficina"
        estado:
          type: string
          enum: [PENDIENTE, CONFIRMADO, ENVIADO, ENTREGADO, CANCELADO]
          description: Estado actual del pedido
          example: "PENDIENTE"
        fechaCreacion:
          type: string
          format: date-time
          description: Fecha y hora de creación del pedido
          example: "2024-06-09T14:00:00Z"
        importe:
          type: number
          format: double
          description: Importe total del pedido en euros
          example: 250.50
    CreatePedidoRequest:
      type: object
      required:
        - referencia
      properties:
        referencia:
          type: string
          description: Referencia única del pedido
          example: "REF-2024-001"
        descripcion:
          type: string
          description: Descripción del pedido
          example: "Pedido de materiales"
        importe:
          type: number
          format: double
          description: Importe total del pedido
          example: 250.50
    UpdatePedidoRequest:
      type: object
      properties:
        referencia:
          type: string
          description: Referencia del pedido
        descripcion:
          type: string
          description: Descripción del pedido
        importe:
          type: number
          format: double
          description: Importe total del pedido
    UpdateEstadoRequest:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          enum: [PENDIENTE, CONFIRMADO, ENVIADO, ENTREGADO, CANCELADO]
          description: Nuevo estado del pedido
          example: "CONFIRMADO"
