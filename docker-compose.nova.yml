# docker-compose.nova.yml
#
# Levanta Paperclip + PostgreSQL + seed de NOVA en un solo comando.
# Los agentes reciben NOVA_HOME y PATH extendido automáticamente.
#
# Primer arranque:
#   BETTER_AUTH_SECRET=paperclip-dev-secret docker compose -f containers/nova-org/docker-compose.nova.yml up --build
#
# Después del primer arranque, autenticar Claude CLI:
#   docker exec -it -u node nova-org-paperclip-1 claude /login
#
# Re-arranque (datos persisten en volúmenes):
#   BETTER_AUTH_SECRET=paperclip-dev-secret docker compose -f containers/nova-org/docker-compose.nova.yml up

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  paperclip:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PAPERCLIP_HOME: "/paperclip"
      SERVE_UI: "true"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-local_trusted}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # NOVA toolchain — agentes heredan estas variables via process.env
      NOVA_HOME: "/opt/nova"
      JAVA_HOME: "/opt/nova/tools/java"
      MAVEN_HOME: "/opt/nova/tools/maven"
      NODE_HOME: "/opt/nova/nodejs"
      NOVA_CLI_PATH: "/opt/nova/nova-cli/bin/nova.js"
      PATH: "/opt/nova/nova-cli/bin:/opt/nova/nodejs:/opt/nova/tools/java/bin:/opt/nova/tools/maven/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s

  seed:
    image: node:lts-trixie-slim
    working_dir: /seed
    volumes:
      - ./company:/seed/company:ro
      - ./scripts:/seed/scripts:ro
      - nova-seed-marker:/seed/.marker
    environment:
      PAPERCLIP_URL: "http://paperclip:3100"
      NOVA_PKG_DIR: "/seed/company"
    depends_on:
      paperclip:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -f /seed/.marker/.seeded ]; then
          echo "[SEED] NOVA already seeded. Skipping."
          exit 0
        fi
        echo "[SEED] Running NOVA company import..."
        node /seed/scripts/import-nova-company.mjs
        mkdir -p /seed/.marker
        touch /seed/.marker/.seeded
        echo "[SEED] Done. NOVA company imported."

volumes:
  pgdata:
  paperclip-data:
  nova-seed-marker:
