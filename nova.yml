---
# NOVA Product Configuration - GDPD (Gestión de Pedidos)
# UUAA: GDPD
# Version: 1.0.0

producto:
  nombre: gdpd
  descripcion: Gestión de Pedidos - Sistema central para administración de pedidos en NOVA COSMOS BBVA
  version: 1.0.0
  uuaa: GDPD

subsistemas:
  backend:
    nombre: gdpd-backend
    descripcion: Servicios backend (API, Daemon, Batch, Scheduler)
    servicios:
      - nombre: gdpd-pedidos-api
        tipo: api
        puerto: 8080
        tecnologia: java11
        spring_boot: 2.7.x

      - nombre: gdpd-event-processor
        tipo: demon
        tecnologia: java11
        spring_boot: 2.7.x

      - nombre: gdpd-batch-reportes
        tipo: batch
        tecnologia: java11
        spring_boot: 2.7.x

      - nombre: gdpd-scheduler-reportes
        tipo: scheduler
        tecnologia: java11
        spring_boot: 2.7.x

  frontend:
    nombre: gdpd-frontend
    descripcion: Frontend Thin3/Angular
    servicios:
      - nombre: gdpd-pedidos-front
        tipo: frontal
        puerto: 4200
        tecnologia: angular12
        framework: thin3

dependencias:
  eureka: spring-cloud-starter-netflix-eureka-client
  api-gateway: spring-cloud-gateway
  config-server: spring-cloud-config-server
  broker: activemq/rabbitmq
  database: postgresql

perfiles:
  dev:
    database: localhost:5432
    broker: tcp://localhost:61616
    eureka: http://localhost:8761/eureka
  int:
    database: db-int.nova:5432
    broker: rabbitmq-int.nova:5672
  pre:
    database: db-pre.nova:5432
    broker: rabbitmq-pre.nova:5672
  pro:
    database: db-pro.nova:5432
    broker: rabbitmq-pro.nova:5672
