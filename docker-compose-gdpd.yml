# docker-compose-gdpd.yml
#
# GDPD v1.0.0 - Gestión de Pedidos - Complete Stack

version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: gdpd-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-nova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nova}
      POSTGRES_DB: ${DB_NAME:-novadb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - gdpd-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nova}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - gdpd-network
    restart: unless-stopped

  # ActiveMQ for INT
  activemq:
    image: apache/activemq:5.17.6-jdk11-alpine
    container_name: gdpd-activemq
    ports:
      - "${ACTIVEMQ_PORT:-61616}:61616"
      - "${ACTIVEMQ_WEB_PORT:-8161}:8161"
    environment:
      ACTIVEMQ_ADMIN_LOGIN: ${AMQ_USER:-admin}
      ACTIVEMQ_ADMIN_PASSWORD: ${AMQ_PASSWORD:-admin}
    volumes:
      - gdpd-activemq-data:/opt/activemq/data
    networks:
      - gdpd-network
    restart: unless-stopped
    profiles:
      - int

  # RabbitMQ for PRE/PRO
  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: gdpd-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - gdpd-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gdpd-network
    restart: unless-stopped
    profiles:
      - pre
      - pro

  # API
  gdpd-pedidos-api:
    build:
      context: ./gdpd-backend/gdpd-pedidos-api
      dockerfile: Dockerfile
    container_name: gdpd-pedidos-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms512m -Dspring.profiles.active=${GDPD_ENV:-int}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${DB_NAME:-novadb}"
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nova}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nova}
      SPRING_ACTIVEMQ_BROKERURL: "tcp://activemq:61616"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - gdpd-network
    restart: unless-stopped

  # Event Processor
  gdpd-event-processor:
    build:
      context: ./gdpd-backend/gdpd-event-processor
      dockerfile: Dockerfile
    container_name: gdpd-event-processor
    environment:
      JAVA_OPTS: "-Xmx256m -Xms256m -Dspring.profiles.active=${GDPD_ENV:-int}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${DB_NAME:-novadb}"
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nova}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nova}
      SPRING_ACTIVEMQ_BROKERURL: "tcp://activemq:61616"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gdpd-network
    restart: unless-stopped

  # Batch
  gdpd-batch-reportes:
    build:
      context: ./gdpd-backend/gdpd-batch-reportes
      dockerfile: Dockerfile
    container_name: gdpd-batch-reportes
    environment:
      JAVA_OPTS: "-Xmx256m -Xms256m -Dspring.profiles.active=${GDPD_ENV:-int}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${DB_NAME:-novadb}"
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nova}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nova}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gdpd-network
    restart: unless-stopped

  # Scheduler
  gdpd-scheduler-reportes:
    build:
      context: ./gdpd-backend/gdpd-scheduler-reportes
      dockerfile: Dockerfile
    container_name: gdpd-scheduler-reportes
    environment:
      JAVA_OPTS: "-Xmx256m -Xms256m -Dspring.profiles.active=${GDPD_ENV:-int}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${DB_NAME:-novadb}"
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nova}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nova}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gdpd-network
    restart: unless-stopped

  # Frontend
  gdpd-pedidos-front:
    build:
      context: ./gdpd-pedidos-front
      dockerfile: Dockerfile
      args:
        API_URL: "${FRONTEND_API_URL:-http://localhost:8080}"
        ENV: "${GDPD_ENV:-int}"
    container_name: gdpd-pedidos-front
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    environment:
      API_URL: "${FRONTEND_API_URL:-http://localhost:8080}"
    depends_on:
      gdpd-pedidos-api:
        condition: service_healthy
    networks:
      - gdpd-network
    restart: unless-stopped

networks:
  gdpd-network:
    driver: bridge

volumes:
  gdpd-pgdata:
  gdpd-activemq-data:
  gdpd-rabbitmq-data:
